apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
  name: system:kube-vip-role
rules:
  - apiGroups: [""]
    resources: ["services", "services/status", "nodes", "endpoints"]
    verbs: ["list","get","watch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["list", "get", "watch", "update", "create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: system:kube-vip-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-vip-role
subjects:
- kind: ServiceAccount
  name: kube-vip
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip-ds
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: kube-vip-ds
  template:
    metadata:
      labels:
        name: kube-vip-ds
    spec:
      serviceAccountName: kube-vip
      # Bypass Cilium completely.
      hostNetwork: true
      tolerations:
      - operator: Exists
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: kube-vip
        image: ghcr.io/kube-vip/kube-vip:v0.8.0
        args:
          - manager
        env:
          # Force kube-vip to talk to the local K3s API
          - name: KUBERNETES_SERVICE_HOST
            value: "127.0.0.1"
          - name: KUBERNETES_SERVICE_PORT
            value: "6443"
          # Kube-VIP Configuration
          - name: vip_arp
            value: "true"
          - name: port
            value: "6443"
          - name: vip_interface
            value: "data0"
          - name: vip_address
            value: "172.10.10.10"
          - name: vip_cidr
            value: "23"
          - name: cp_enable
            value: "true"
          - name: cp_namespace
            value: "kube-system"
          - name: svc_enable
            value: "true"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
