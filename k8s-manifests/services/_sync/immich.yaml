apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-infra
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/services/immich/infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-release
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/services/immich/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: immich-infra
