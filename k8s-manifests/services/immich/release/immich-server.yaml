apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 15m
  chart:
    spec:
      chart: immich
      version: "0.11.1"
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: immich-server-values
      valuesKey: values.yaml
  values:
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-database-app
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: immich-database-app
                    key: port
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-database-app
                    key: dbname
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-database-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-database-app
                    key: password
              IMMICH_HELMET_FILE: true

    immich:
      persistence:
        library:
          existingClaim: immich-library

    valkey:
      enabled: true

    server:
      enabled: true
      ingress:
        main:
          enabled: true
          className: nginx
          hosts:
            - host: immich.lasz.io
              paths:
                - path: "/"
                  service:
                    identifier: main
          tls:
            - secretName: lasz-io-tls
              hosts:
                - immich.lasz.io

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: emptyDir
          accessMode: ReadWriteMany
