apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich
configMapGenerator:
  - name: immich-server-values
    files:
      - values.yaml=immich-server.values.yaml
generatorOptions:
  disableNameSuffixHash: true
resources:
  - immich-library-pvc.yaml
  - immich-server.yaml
