apiVersion: apps/v1
kind: Deployment
metadata:
  name: qui
  namespace: streaming
  labels:
    app: qui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qui
  template:
    metadata:
      labels:
        app: qui
    spec:
      containers:
        - name: qui
          image: ghcr.io/autobrr/qui:latest
          ports:
            - containerPort: 7476
              name: http
          env:
            - name: TZ
              value: "Etc/UTC"
            - name: QUI__AUTH_DISABLED
              value: "true" # Handled by Nginx Oauth proxy
            - name: QUI__I_ACKNOWLEDGE_THIS_IS_A_BAD_IDEA
              value: "true"
            - name: QUI__AUTH_DISABLED_ALLOWED_CIDRS
              value: "10.42.0.0/16,192.168.1.0/24,172.10.10.0/23"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: qui
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 7476
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: streaming-configs
        - name: media
          persistentVolumeClaim:
            claimName: shared-media
---
apiVersion: v1
kind: Service
metadata:
  name: qui
  namespace: streaming
spec:
  type: ClusterIP
  ports:
    - port: 7476
      targetPort: 7476
      protocol: TCP
      name: http
  selector:
    app: qui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qui
  namespace: streaming
  annotations:
    nginx.ingress.kubernetes.io/auth-url: |-
        http://authentik-server.auth.svc.cluster.local/outpost.goauthentik.io/auth/nginx
    nginx.ingress.kubernetes.io/auth-signin: |-
        https://auth.lasz.io/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: |-
        Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
    nginx.ingress.kubernetes.io/auth-snippet: |
        proxy_set_header X-Forwarded-Host $http_host;
spec:
  tls:
  - secretName: lasz-io-tls
    hosts:
    - qui.lasz.io
  ingressClassName: nginx
  rules:
  - host: qui.lasz.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qui
            port:
              name: http
