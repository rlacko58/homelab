apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  timeout: 5m0s
  chart:
    spec:
      chart: cert-manager
      version: "1.20.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    installCRDs: true
    replicaCount: 1

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    extraArgs:
      - --acme-http01-solver-resource-limits-cpu=0.1
      - --acme-http01-solver-resource-request-cpu=10m
      - --acme-http01-solver-resource-limits-memory=100Mi
      - --acme-http01-solver-resource-request-memory=10Mi

    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        cpu: 1
        memory: 200Mi

    webhook:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 1
          memory: 100Mi
      extraArgs:
        - --logging-format=json

    cainjector:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          cpu: 1
          memory: 200Mi
      extraArgs:
        - --logging-format=json
