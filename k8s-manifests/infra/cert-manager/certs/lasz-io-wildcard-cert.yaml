apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lasz-io-wildcard-cert
  namespace: cert-manager
spec:
  secretName: lasz-io-tls
  commonName: "*.lasz.io"
  dnsNames:
    - "*.lasz.io"
    - "lasz.io"
  issuerRef:
    name: cloudflare-dns01-lasz-io
    kind: ClusterIssuer
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ingress-nginx,auth,flux-system"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ingress-nginx,auth,flux-system"
