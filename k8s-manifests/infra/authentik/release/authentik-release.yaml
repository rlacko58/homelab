apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: auth
spec:
  interval: 15m
  chart:
    spec:
      chart: authentik
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    global:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: geoip-tmp
          emptyDir: {}

    authentik:
      log_level: info
      existingSecret:
        secretName: authentik-secrets
    
    server:
      replicas: 1
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - auth.lasz.io
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: lasz-io-tls
            hosts:
              - auth.lasz.io
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
    
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
    
    geoip:
      enabled: true
      editionIds: "GeoLite2-City GeoLite2-ASN"
      updateInterval: 8
      existingSecret:
        secretName: geoip-secrets
        accountId: account_id
        licenseKey: license_key
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: geoip-tmp
          mountPath: /tmp
    
    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-postgresql-secret
        secretKeys:
          adminPasswordKey: postgres-password
          userPasswordKey: password
      primary:
        persistence:
          enabled: true
          storageClass: "tns-csi-nvmeof"
          size: 10Gi
        containerSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
    
    serviceAccount:
      create: true
      annotations: {}
      serviceAccountSecret:
        enabled: false
