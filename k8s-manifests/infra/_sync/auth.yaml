apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/infra/authentik/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-release
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/infra/authentik/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: authentik-secrets
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age