---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-release
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/infra/cert-manager/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 5m0s
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuer
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/infra/cert-manager/issuer
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: cert-manager-release
  timeout: 3m0s
  healthChecks:
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: cloudflare-dns01-lasz-io
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-certs
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s-manifests/infra/cert-manager/certs
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: cert-manager-release
  timeout: 3m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
