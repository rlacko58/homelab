apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-logs-cluster
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: victoria-logs-cluster
      version: "0.0.29"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  values:
    vlselect:
      replicaCount: 1
      horizontalPodAutoscaler:
        enabled: true
        maxReplicas: 2
        minReplicas: 1
        metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80
      podDisruptionBudget:
        enabled: true
        maxUnavailable: 1
      resources:
        limits: { cpu: 250m, memory: 512Mi }
        requests: { cpu: 50m, memory: 128Mi }
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9471"

    vlinsert:
      enabled: true
      replicaCount: 1
      resources:
        limits: { cpu: 500m, memory: 512Mi }
        requests: { cpu: 50m, memory: 128Mi }
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9481"

    vlstorage:
      enabled: true
      replicaCount: 1
      retentionPeriod: "7d"
      persistentVolume:
        enabled: true
        storageClassName: "tns-csi-nvmeof"
        size: 16Gi
      resources:
        limits: { cpu: 500m, memory: 1280Mi }
        requests: { cpu: 50m, memory: 256Mi }
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9491"
