---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: prometheus-node-exporter
      version: "4.51.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    service:
      annotations:
        prometheus.io/port: "9100"
        prometheus.io/scrape: "true"
