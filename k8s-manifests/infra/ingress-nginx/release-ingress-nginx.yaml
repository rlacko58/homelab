apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.*"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      replicaCount: 1
      allowSnippetAnnotations: true
      
      containerPort:
        http: 8080
        https: 8081
      extraArgs:
        http-port: 8080
        https-port: 8081

      config:
        annotations-risk-level: Critical
        strict-validate-path-type: false

      image:
        allowPrivilegeEscalation: false

      resources:
        requests:
          cpu: 100m
          memory: 90Mi
        limits:
          cpu: 2
          memory: 2Gi

      service:
        enabled: true
        type: LoadBalancer
        # This ensures the client source IP is preserved
        externalTrafficPolicy: Local 
        annotations: {}
        loadBalancerIP: "172.10.10.11"
        targetPorts:
          http: http
          https: https

      metrics:
        enabled: true
        service:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "10254"
