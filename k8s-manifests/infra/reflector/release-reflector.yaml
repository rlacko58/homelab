apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  releaseName: reflector
  chart:
    spec:
      chart: reflector
      version: "10.0.16"
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  interval: 1h
  install:
    remediation:
      retries: 3
  values:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
