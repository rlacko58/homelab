apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vpn
  namespace: kube-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vpn",
      "type": "ipvlan",
      "master": "vpn0",
      "mode": "l2",
      "ipam": {
        "type": "host-local",
        "subnet": "172.10.20.0/23",
        "rangeStart": "172.10.20.10",
        "rangeEnd": "172.10.20.100",
        "routes": [
          { "dst": "0.0.0.0/0", "gw": "172.10.20.1" }
        ]
      }
    }