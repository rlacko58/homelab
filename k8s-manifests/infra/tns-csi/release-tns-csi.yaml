apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tns-csi
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: tns-csi-driver
      version: "0.12.3"
      sourceRef:
        kind: HelmRepository
        name: tns-csi-repo
        namespace: flux-system
  values:
    truenas:
      existingSecret: "tns-csi-truenas-api-config"
      skipTLSVerify: true

    storageClasses:
      - name: "tns-csi-nvmeof"
        protocol: nvmeof
        isDefault: true
        enabled: true
        pool: "data"
        parentDataset: "data/k8s/nvmeof"
        server: "172.10.10.100"
        commentTemplate: "{{ .PVCNamespace }}/{{ .PVCName }}"
        reclaimPolicy: Delete
        # Ensure on cluster recreation that the existing volumes are adopted by the new cluster
        markAdoptable: true
        adoptExisting: true
