name: Dry Run NixOS (PRs)

on:
  pull_request:
    paths:
      - '**/*.nix'
      - 'flake.lock'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@1828eb4e5414b8dfe36daae53ea3e4b8c3fdec7a # main

      - name: Verify NixOS Configuration
        run: |
          nix run nixpkgs#nixos-rebuild -- build \
            --flake .#eris \
            --show-trace
