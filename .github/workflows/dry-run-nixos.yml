name: Dry Run NixOS (PRs)

on:
  pull_request:
    paths:
      - '**/*.nix'
      - 'flake.lock'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@3c034b51a9deec0a09ef1df8b436ac5db50fae94 # main

      - name: Verify NixOS Configuration
        run: |
          nix run nixpkgs#nixos-rebuild -- build \
            --flake .#eris \
            --show-trace
