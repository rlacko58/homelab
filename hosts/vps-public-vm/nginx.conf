# /etc/nginx.conf

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
   log_format http_detailed '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" "$host"';

    server {
        listen 80;
        server_name _; # Matches all domains

        access_log /var/log/nginx/access.log http_detailed;

        location / {
            return 301 https://$host$request_uri;
        }
    }
}

stream {
    ssl_preread on;

    log_format sniproxy '$remote_addr - - [$time_local] "GET / TCP/1.0" '
                        '$status $bytes_sent "-" "-" "$ssl_preread_server_name"';
    access_log /var/log/nginx/stream_access.log sniproxy;

    server {
        listen 443;
        proxy_protocol on;
        proxy_pass 100.87.15.46:8081;
    }
}
